<!DOCTYPE html>
<html>
<head>
    <title>Birthday Mystery 🎁</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #1e1e2f, #000);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 18px;
        }

        #puzzle {
            width: 90vw;
            max-width: 320px;
            height: 90vw;
            max-height: 320px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .tile {
            background-size: 300% 300%;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .tile:active {
            transform: scale(0.95);
        }

        #message {
            display: none;
            padding: 20px;
            text-align: left;
            white-space: pre-line;
            font-family: 'Dancing Script', cursive;
            font-size: 20px;
            line-height: 1.6;
        }

        .bold-title {
            font-weight: bold;
            font-size: 28px;
            text-align: center;
            display: block;
            margin: 15px 0;
        }

        #playBtn {
            display: none;
            margin-top: 10px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #ffcc70;
            color: black;
            font-weight: bold;
            font-size: 16px;
        }

        .glow {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #fff; }
            to { box-shadow: 0 0 20px #ffcc70; }
        }
    </style>
</head>

<body>

<h1>🧩 A small mystery for you… solve it 😊</h1>

<div id="puzzle"></div>

<div id="message"></div>

<button id="playBtn">Tap to hear message 🎵</button>

<!-- 🎻 Violin Music -->
<audio id="music">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_4c5e6cfe46.mp3?filename=emotional-violin-ambient-113997.mp3" type="audio/mpeg">
</audio>

<script>
    const puzzle = document.getElementById("puzzle");
    const messageBox = document.getElementById("message");

    const image = "https://raw.githubusercontent.com/ITSFORU2204/Unknow-Wish/main/image.jpg";

    // almost solved
    let tiles = [1,2,3,4,5,6,7,9,8];

    function draw() {
        puzzle.innerHTML = "";

        tiles.forEach((num, index) => {
            const tile = document.createElement("div");

            tile.className = "tile";
            tile.style.backgroundImage = `url(${image})`;

            let correctIndex = num - 1;

            let x = (correctIndex % 3) * 50;
            let y = Math.floor(correctIndex / 3) * 50;

            tile.style.backgroundPosition = `${x}% ${y}%`;

            tile.onclick = () => move(index);

            puzzle.appendChild(tile);
        });
    }

    function move(index) {
        if (index === 7 || index === 8) {
            [tiles[7], tiles[8]] = [tiles[8], tiles[7]];
            draw();
            checkWin();
        }
    }

    function checkWin() {
        if (tiles.join() === "1,2,3,4,5,6,7,8,9") {

            // glow effect
            document.querySelectorAll(".tile").forEach(t => {
                t.classList.add("glow");
            });

            messageBox.style.display = "block";
            document.getElementById("playBtn").style.display = "inline-block";

            typeMessage();

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    // ✍️ TYPEWRITER TEXT
    const fullText = `You solved it 😊

Not everything needs a name...
Some people silently wish you happiness.

🎉 HAPPY BIRTHDAY 🎉

May your days be filled with smiles,
your heart with peace,
and your life with beautiful moments.

Stay happy… always 💫`;

    let index = 0;

    function typeMessage() {
        if (index < fullText.length) {
            messageBox.innerHTML += fullText.charAt(index);
            index++;
            setTimeout(typeMessage, 40);
        }
    }

    // 🎻 Play music on button click
    document.getElementById("playBtn").onclick = function() {
        document.getElementById("music").play();
    };

    draw();
</script>

</body>
</html>
