<!DOCTYPE html>
<html>
<head>
    <title>A Small Mystery 🎁</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #1e1e2f, #000);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0.9;
        }

        #puzzle {
            width: 90vw;
            max-width: 320px;
            height: 90vw;
            max-height: 320px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .tile {
            background-size: 300% 300%;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .tile:active {
            transform: scale(0.95);
        }

        #message {
            display: none;
            padding: 25px;
            white-space: pre-line;
            font-family: 'Dancing Script', cursive;
            font-size: 22px;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .show {
            display: block;
            opacity: 1;
        }

        .glow {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #fff; }
            to { box-shadow: 0 0 20px #ffcc70; }
        }
    </style>
</head>

<body>

<h1>🧩 Solve this… and you’ll know</h1>

<div id="puzzle"></div>

<div id="message"></div>

<!-- 🎻 Music (reliable link) -->
<audio id="music" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c6f7c8b7f.mp3?filename=soft-piano-ambient-110624.mp3" type="audio/mpeg">
</audio>

<script>
const puzzle = document.getElementById("puzzle");
const messageBox = document.getElementById("message");
const music = document.getElementById("music");

const image = "https://raw.githubusercontent.com/ITSFORU2204/Unknow-Wish/main/image.jpg";

// almost solved
let tiles = [1,2,3,4,5,6,7,9,8];

function draw() {
    puzzle.innerHTML = "";

    tiles.forEach((num, index) => {
        const tile = document.createElement("div");

        tile.className = "tile";
        tile.style.backgroundImage = `url(${image})`;

        let correctIndex = num - 1;

        let x = (correctIndex % 3) * 50;
        let y = Math.floor(correctIndex / 3) * 50;

        tile.style.backgroundPosition = `${x}% ${y}%`;

        tile.onclick = () => move(index);

        puzzle.appendChild(tile);
    });
}

function move(index) {
    if (index === 7 || index === 8) {
        [tiles[7], tiles[8]] = [tiles[8], tiles[7]];
        draw();
        checkWin();
    }
}

function playMusic() {
    music.play().catch(() => {
        // fallback: play on next tap anywhere
        document.body.addEventListener("click", () => {
            music.play();
        }, { once: true });
    });
}

function checkWin() {
    if (tiles.join() === "1,2,3,4,5,6,7,8,9") {

        // glow
        document.querySelectorAll(".tile").forEach(t => {
            t.classList.add("glow");
        });

        // play music (after user tap)
        setTimeout(playMusic, 200);

        // show message
        setTimeout(() => {
            messageBox.classList.add("show");
            typeMessage();
        }, 500);

        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
}

// ✍️ TYPEWRITER MESSAGE
const text = `You solved it 😊

Not everything needs a name...
Some people silently wish you happiness.

🎉 HAPPY BIRTHDAY 🎉

May your days be filled with smiles,
your heart with peace,
and your life with beautiful moments.

Stay happy… always 💫`;

let i = 0;

function typeMessage() {
    if (i < text.length) {
        messageBox.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeMessage, 40);
    }
}

draw();
</script>

</body>
</html>
