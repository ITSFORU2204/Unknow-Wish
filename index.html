<!DOCTYPE html>
<html>
<head>
    <title>A Small Mystery 🎁</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #000;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        h1 {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0.8;
        }

        #puzzle {
            width: 90vw;
            max-width: 320px;
            height: 90vw;
            max-height: 320px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .tile {
            background-size: 300% 300%;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .tile:active {
            transform: scale(0.95);
        }

        /* cinematic dark overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        #message {
            display: none;
            padding: 25px;
            text-align: center;
            white-space: pre-line;
            font-family: 'Dancing Script', cursive;
            font-size: 22px;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .show {
            opacity: 1 !important;
        }

        .glow {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #fff; }
            to { box-shadow: 0 0 25px #ffcc70; }
        }
    </style>
</head>

<body>

<h1>🧩 Solve this… and you’ll know</h1>

<div id="puzzle"></div>

<div id="overlay"></div>

<div id="message"></div>

<!-- 🎻 Emotional Music -->
<audio id="music" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_9466c8c5d6.mp3?filename=emotional-piano-ambient-124008.mp3" type="audio/mpeg">
</audio>

<script>
    const puzzle = document.getElementById("puzzle");
    const messageBox = document.getElementById("message");
    const overlay = document.getElementById("overlay");
    const music = document.getElementById("music");

    const image = "https://raw.githubusercontent.com/ITSFORU2204/Unknow-Wish/main/image.jpg";

    let tiles = [1,2,3,4,5,6,7,9,8];

    function draw() {
        puzzle.innerHTML = "";

        tiles.forEach((num, index) => {
            const tile = document.createElement("div");

            tile.className = "tile";
            tile.style.backgroundImage = `url(${image})`;

            let correctIndex = num - 1;

            let x = (correctIndex % 3) * 50;
            let y = Math.floor(correctIndex / 3) * 50;

            tile.style.backgroundPosition = `${x}% ${y}%`;

            tile.onclick = () => move(index);

            puzzle.appendChild(tile);
        });
    }

    function move(index) {
        if (index === 7 || index === 8) {
            [tiles[7], tiles[8]] = [tiles[8], tiles[7]];
            draw();
            checkWin();
        }
    }

    function forcePlayMusic() {
        music.play().catch(() => {
            document.body.addEventListener("click", () => {
                music.play();
            }, { once: true });
        });
    }

    function checkWin() {
        if (tiles.join() === "1,2,3,4,5,6,7,8,9") {

            document.querySelectorAll(".tile").forEach(t => {
                t.classList.add("glow");
            });

            // start music
            setTimeout(forcePlayMusic, 200);

            // cinematic fade
            setTimeout(() => {
                overlay.style.opacity = "0.8";
            }, 500);

            // show message
            setTimeout(() => {
                messageBox.style.display = "block";
                messageBox.classList.add("show");
                typeMessage();
            }, 1500);
        }
    }

    const text = `You solved it...

And now,
something was waiting for you.

Not every wish comes with a name,
but some come from a place
that once cared deeply.

🎉 HAPPY BIRTHDAY 🎉

May your life be filled with peace,
your heart with happiness,
and your days with beautiful moments.

Someone…
somewhere…
is silently wishing you well 💫`;

    let i = 0;

    function typeMessage() {
        if (i < text.length) {
            messageBox.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeMessage, 45);
        }
    }

    draw();
</script>

</body>
</html>
