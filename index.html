<!DOCTYPE html>
<html>
<head>
    <title>Birthday Mystery 🎁</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to bottom, #1e1e2f, #000);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 18px;
        }

        #puzzle {
            width: 90vw;
            max-width: 320px;
            height: 90vw;
            max-height: 320px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .tile {
            background-size: 300% 300%;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.3s ease;
        }

        .tile:active {
            transform: scale(0.95);
        }

        #message {
            display: none;
            padding: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        /* ✨ smooth glow effect after solve */
        .glow {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #fff; }
            to { box-shadow: 0 0 20px #ffcc70; }
        }
    </style>
</head>

<body>

<h1>🧩 A small mystery for you… solve it 😊</h1>

<div id="puzzle"></div>

<div id="message">
    <p>You solved it 😊</p>
    <p>Not everything needs a name...</p>
    <p>Some people silently wish you happiness.</p>

    <h2>🎉 Happy Birthday 🎉</h2>

    <p>
        May your days be filled with smiles,<br>
        your heart with peace,<br>
        and your life with beautiful moments.<br><br>
        Stay happy… always 💫
    </p>
</div>

<!-- 🎵 Good vibes soft piano music -->
<audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_6c6f7c8b7f.mp3?filename=soft-piano-ambient-110624.mp3"></audio>

<script>
    const puzzle = document.getElementById("puzzle");

    // 👉 ONLY CHANGE THIS
    const image = "https://raw.githubusercontent.com/ITSFORU2204/Unknow-Wish/main/image.jpg";

    // almost solved
    let tiles = [1,2,3,4,5,6,7,9,8];

    function draw() {
        puzzle.innerHTML = "";

        tiles.forEach((num, index) => {
            const tile = document.createElement("div");

            tile.className = "tile";
            tile.style.backgroundImage = `url(${image})`;

            let correctIndex = num - 1;

            let x = (correctIndex % 3) * 50;
            let y = Math.floor(correctIndex / 3) * 50;

            tile.style.backgroundPosition = `${x}% ${y}%`;

            tile.onclick = () => move(index);

            puzzle.appendChild(tile);
        });
    }

    function move(index) {
        // only last two tiles move (easy solve)
        if (index === 7 || index === 8) {
            [tiles[7], tiles[8]] = [tiles[8], tiles[7]];
            draw();
            checkWin();
        }
    }

    function checkWin() {
        if (tiles.join() === "1,2,3,4,5,6,7,8,9") {
            document.getElementById("message").style.display = "block";

            // 🎵 play music
            document.getElementById("music").play();

            // ✨ add glow effect
            document.querySelectorAll(".tile").forEach(t => {
                t.classList.add("glow");
            });

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    draw();
</script>

</body>
</html>
